<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./../css/dashboard.css">
    <link rel="stylesheet" href="./../css/menu.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


    <title>Dashboard</title>
</head>

<body>
    <div class="container">

        <div class="menu">
            <div class="img-h1">
                <img src="./image/logo.png" alt="logo da empresa">
                <h1>Bem-vindo(a)!</h1>
            </div>

            <div class="nav-bar">
                <a href="#" class="nav-item">
                    <img src="./image/dash.png"> Painel
                </a>
                <a href="#" class="nav-item">
                    <img src="./image/historico.png"> Preferências
                </a>
                  
            </div>

            <button><a href="../index.html">Sair</a></button>
        </div>

        <div class="main">

            <div class="box">

                <div class="box-info">
                    <div class="kpi-box">
                        <div class="h5-img">
                            <h5>Total de Usuários</h5>
                            <img src="./image/taxa.png">
                        </div>

                        <span class="verde">0</span>
                        
                    </div>

                    <div class="kpi-box">
                        <div class="h5-img">
                            <h5>Animação Mais Popular</h5>
                            <img src="./image/porta.png">
                        </div>
                    </div>

                    <div class="kpi-box">
                        <div class="h5-img">
                            <h5>Técnica Mais Popular</h5>
                            <img src="./image/temperatura.png">
                        </div>
                    </div>

                    <div class="kpi-box">
                        <div class="h5-img">
                            <h5>Canal Mais Popular</h5>
                            <img src="./image/risco.png">
                        </div>
                    </div>
                </div>

                <div class="containergraficos">

                    <div class="colunaesquerda">
                    <div class="grafico">
                    <h3>Usuários Cadastrados</h3>
                    <canvas id="grafico1"></canvas>
                    </div>
                    </div>
                  
                    <div class="colunadireita">
                    <div class="grafico">
                    <h3>Canal Favorito</h3>
                    <canvas id="grafico2"></canvas>
                    </div>

                    <div class="grafico">
                    <h3>Técnica Favorita</h3>
                    <canvas id="grafico3"></canvas>
                    </div>

                    </div>
               </div>
              
        
    </div>
</body>

</html>

<script>
    //grafico1

    const labels1= [
        'Segunda',
        'Terça',
        'Quarta',
        'Quinta',
        'Sexta',
        'Sábado',
        'Domingo',
    ];

    const data1 = {
        labels : labels1,
        datasets: [{
            label: 'Usuários Cadastrados por Dia',
            backgroundColor: 'rgb(255,99,132)',
            data:[1,3,5,6,1,3,1]
        }]
    };

    const config1 ={
    type:'line',
    data:data1,
    options:{}
    };

const grafico1= new Chart(
    document.getElementById('grafico1'),
    config1
);
 const labels2= [
        'Cartoon Network',
        'Disney',
        'Nickelodeon',
        
    ];

    const data2 = {
        labels : labels2,
        datasets: [{
            label: 'Canal Favorito',
            backgroundColor: 'rgb(255,99,132)',
            data:[8,7,5]
        }]
    };

    const config2 ={
    type:'bar',
    data:data2,
    options:{}
    };
const grafico2= new Chart(
    document.getElementById('grafico2'),
    config2
);
const labels3= [
        '2D Tradigital',
        '2D Cutout',
        '3D',
        'Stop Motion',
        'Motion Graphics',
        
    ];

    const data3 = {
        labels : labels3,
        datasets: [{
            label: 'Técnica Favorita',
            backgroundColor: 'rgb(255,99,132)',
            data:[8,7,5]
        }]
    };

    const config3 ={
    type:'bar',
    data:data3,
    options:{}
    };
const grafico3= new Chart(
    document.getElementById('grafico3'),
    config3
);

    function obterDados(grafico, endpoint) {
        fetch('http://localhost:3300/sensores/' + endpoint)
            .then(response => response.json())
            .then(valores => {
                valores.forEach((valor,indice)=>{
                    grafico.data.datasets[0].data[indice] = valor;

                });
                grafico.update();
            })
            .catch(error => console.error('Erro ao obter dados:', error));
    }

    setInterval(() => {
        obterDados(grafico1, 'analogico');
        obterDados(grafico2, 'analogico');
        obterDados(grafico3, 'analogico');
    }, 1000);

</script>
